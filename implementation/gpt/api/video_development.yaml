name: video_development
description: >
  Full video development spoke. Given a video concept or keyword, runs the complete
  content production pipeline: keyword clustering, hook writing (5 variants with
  drop-off risk ratings), title generation, thumbnail concept, full script with
  section-by-section structure, b-roll notes per section, and 3 or more Short
  extracts ready for repurposing. Governed by quality gates before output.

  Use when the creator is ready to produce a specific video and needs the full
  creative package. For just a title or just a hook, invoke those atoms directly
  via creator_core_dispatch.
parameters:
  type: object
  properties:
    concept:
      type: string
      description: >
        The video concept, keyword, or topic. Can be a rough idea or a specific
        keyword from seo_keywords output.
        Example: "seasonal home decor project makeover under $40",
        "thrift store armoire flip — chalk paint and dark wax".
    platform_targets:
      type: array
      items:
        type: string
        enum: [youtube, pinterest, tiktok]
      description: Target platforms. Defaults to YouTube + TikTok/Shorts.
    video_length_target:
      type: string
      enum: [short_form_under_60s, mid_form_5_to_10_min, long_form_15_plus_min]
      description: Target video length. Defaults to long_form_15_plus_min for YouTube.
    season:
      type: string
      enum: [fall, holiday, spring, summer, evergreen]
      description: Optional season context for seasonal hook and timing recommendations.
    budget_tier:
      type: string
      enum: [under_50, 50_to_200, 200_to_500, 500_plus]
      description: Project budget tier for adaptation in the script and hook.
    skill_level:
      type: string
      enum: [beginner, intermediate, advanced]
      description: Creator's DIY skill level for content complexity adaptation.
  required:
    - concept
returns: >
  JSON: keyword_cluster, hooks (5 variants with hook_type, text, drop_off_risk_rating),
  titles (3 to 5 candidates with CTR rationale), thumbnail_concept
  (foreground, background, text_overlay, color_palette), script
  (sections: intro, body_sections[], outro — each with narration, b_roll_notes,
  on_screen_text), short_extracts (3+ clips with start_cue, end_cue, caption,
  hook_for_short), quality_review_score, fabrication_flags.
