openapi: 3.1.0
info:
  title: Creator OS Jurisdictional Overlay (advisory)
  version: "1.0.0"
  description: >
    ADVISORY jurisdictional overlays for a project location. Geocodes an address and resolves which
    location-based rules apply (local historic district, zoning, FEMA flood zone) by querying public
    government GIS/geocoding endpoints that perform point-in-polygon SERVER-SIDE. Keyless. ADVISORY
    PLANNING INFORMATION ONLY, never a legal, permitting, engineering, or code-compliance
    determination; a genuine conflict between a safety rule and an aesthetic rule is for the authority
    having jurisdiction, not this tool. Values behind ToS-limited code portals (e.g. exact setback
    numbers) are NOT returned; cite the ordinance and verify locally. Coverage of local historic/zoning
    layers here is City of Orlando; flood and geocoding are nationwide.
servers:
  - url: https://services5.arcgis.com/mMuoPCaIYD4wEgDl/arcgis/rest/services
paths:
  /geocode:
    servers:
      - url: https://geocoding.geo.census.gov/geocoder
    get:
      operationId: geocodeAddress
      summary: Geocode a US street address to longitude/latitude (EPSG 4326). Advisory, not survey-grade.
      parameters:
        - name: address
          in: query
          required: true
          description: One-line US street address, e.g. 809 E Amelia St, Orlando FL 32803.
          schema:
            type: string
        - name: benchmark
          in: query
          required: true
          schema:
            type: string
            default: "Public_AR_Current"
        - name: format
          in: query
          required: true
          schema:
            type: string
            default: "json"
      responses:
        "200":
          description: "Census geocoder result. Read result.addressMatches first coordinates: x is longitude, y is latitude."
  /OrlandoHistoricLocalDistricts/FeatureServer/0/query:
    get:
      operationId: historicDistrictAtPoint
      summary: >
        Which City of Orlando LOCAL historic district (if any) contains the point. If one is returned,
        exterior work needs a Certificate of Appropriateness (Orlando City Code Ch. 62 sec. 62.200)
        before a permit. Advisory only.
      parameters:
        - name: geometry
          in: query
          required: true
          description: "Point as lon,lat e.g. -81.3674,28.5495"
          schema:
            type: string
        - name: geometryType
          in: query
          required: true
          schema:
            type: string
            default: "esriGeometryPoint"
        - name: inSR
          in: query
          required: true
          schema:
            type: string
            default: "4326"
        - name: spatialRel
          in: query
          required: true
          schema:
            type: string
            default: "esriSpatialRelIntersects"
        - name: outFields
          in: query
          required: true
          schema:
            type: string
            default: "HistoricDistricts"
        - name: returnGeometry
          in: query
          required: true
          schema:
            type: string
            default: "false"
        - name: f
          in: query
          required: true
          schema:
            type: string
            default: "geojson"
      responses:
        "200":
          description: "GeoJSON FeatureCollection. Each feature property HistoricDistricts names the district."
  /OrlandoLUZoning/FeatureServer/0/query:
    get:
      operationId: zoningAtPoint
      summary: >
        City of Orlando zoning plus overlays at the point (e.g. R-2B/T/HP = base district plus
        Traditional City plus Historic Preservation). Exact setback numbers are NOT returned (they live
        in the Ch. 58 code, ToS-limited); cite the code and verify with the City. Advisory only.
      parameters:
        - name: geometry
          in: query
          required: true
          description: "Point as lon,lat e.g. -81.3674,28.5495"
          schema:
            type: string
        - name: geometryType
          in: query
          required: true
          schema:
            type: string
            default: "esriGeometryPoint"
        - name: inSR
          in: query
          required: true
          schema:
            type: string
            default: "4326"
        - name: spatialRel
          in: query
          required: true
          schema:
            type: string
            default: "esriSpatialRelIntersects"
        - name: outFields
          in: query
          required: true
          schema:
            type: string
            default: "Zoning,OverlayA,OverlayB"
        - name: returnGeometry
          in: query
          required: true
          schema:
            type: string
            default: "false"
        - name: f
          in: query
          required: true
          schema:
            type: string
            default: "geojson"
      responses:
        "200":
          description: "GeoJSON FeatureCollection. Feature property Zoning is the district code."
  /flood:
    servers:
      - url: https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28
    get:
      operationId: floodZoneAtPoint
      summary: >
        FEMA National Flood Hazard Layer flood zone at the point (e.g. AE, VE, X). Advisory only; NOT a
        substitute for an official FEMA flood determination or the stamped FIRM.
      parameters:
        - name: geometry
          in: query
          required: true
          description: "Point as lon,lat e.g. -81.3674,28.5495"
          schema:
            type: string
        - name: geometryType
          in: query
          required: true
          schema:
            type: string
            default: "esriGeometryPoint"
        - name: inSR
          in: query
          required: true
          schema:
            type: string
            default: "4326"
        - name: spatialRel
          in: query
          required: true
          schema:
            type: string
            default: "esriSpatialRelIntersects"
        - name: outFields
          in: query
          required: true
          schema:
            type: string
            default: "FLD_ZONE,SFHA_TF"
        - name: returnGeometry
          in: query
          required: true
          schema:
            type: string
            default: "false"
        - name: f
          in: query
          required: true
          schema:
            type: string
            default: "json"
      responses:
        "200":
          description: "ArcGIS result. Feature attribute FLD_ZONE is the flood zone."
