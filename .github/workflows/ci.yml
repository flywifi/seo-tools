name: ci

on:
  schedule:
    - cron: '0 6 * * 2'   # weekly, Tuesday 06:00 UTC — competitor intelligence run
  push:
    branches: ["**"]
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # the commit-message backstop needs history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Drift guard
        run: python3 tools/sync_check.py
      - name: Secret scan (tracked content)
        run: python3 tools/secret_scan.py --tracked
      - name: Commit hygiene backstop (messages + author emails after the policy boundary)
        run: |
          git fetch origin main --depth=200 || true
          if git rev-parse origin/main >/dev/null 2>&1; then
            python3 tools/secret_scan.py --commit-messages origin/main..HEAD
          else
            python3 tools/secret_scan.py --commit-messages HEAD~20..HEAD
          fi
      - name: Version consistency
        run: python3 tools/version.py --check
      - name: Push-blocker predictor selftest
        run: python3 tools/preflight_push.py --selftest
      - name: Dependency currency selftest (read-only, offline)
        run: python3 tools/dependency_currency.py --selftest
      - name: Update-check selftest (read-only, offline)
        run: python3 tools/update_check.py --selftest
      - name: Eval JSON validity
        run: |
          python3 - <<'PY'
          import json, pathlib, sys
          bad = 0
          for p in pathlib.Path("skills").rglob("evals/evals.json"):
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as exc:
                  print("invalid", p, exc)
                  bad += 1
          sys.exit(1 if bad else 0)
          PY
      - name: Packaging
        run: python3 tools/package_skill.py --all

  competitor-intel:
    runs-on: ubuntu-latest
    # Only run on schedule trigger or explicit workflow_dispatch; skip on PR/push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install crawl dependencies
        run: pip install -r requirements-crawl.txt -r requirements-scraper.txt
      - name: Fetch competitor snapshots
        run: python3 tools/competitor_snapshot.py --fetch
        continue-on-error: true   # fetch failures are non-blocking; parse what we have
      - name: Parse saved HTML into index
        run: python3 tools/competitor_snapshot.py --parse
        continue-on-error: true   # empty/gitignored snapshot dir is not a failure; parse what exists
      - name: Export sanitized summary
        run: python3 tools/competitor_snapshot.py --export-summary
        continue-on-error: true   # no snapshots to summarize is a no-op, not a red build
      - name: Secret scan before any artifact or commit
        run: python3 tools/secret_scan.py --tracked
      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: competitor-snapshots-${{ github.run_id }}
          path: pipeline/competitor-snapshots/
          if-no-files-found: warn
          retention-days: 30
      - name: Commit competitor-channels.json update (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add canonical-sources/keyword-library/competitor-channels.json
          git diff --cached --quiet || git commit -m "chore: update competitor-channels.json from scheduled snapshot run"
          git push

  # currency-report job retired in P36. Source/dependency freshness is now a fully LOCAL runtime:
  # each user runs the token-free detection on their own machine and it writes to their own store
  # overlay (docs/FRESHNESS.md; tools/freshness_overlay.py). This keeps the freshness design with
  # ZERO GitHub coupling — no scheduled job reads or reports on the registry in CI. The guard job
  # above validates the dependency *registry* (invariant 23: every requirement and MCP connector has
  # a source-registry entry) and runs dependency_currency/update_check --selftest as read-only,
  # offline steps that exercise the detection logic without any network call or registry write. The
  # actual currency detection (which reaches PyPI/GitHub and writes the user's overlay) stays a
  # per-user runtime; CI never fetches or reports on live source freshness.
